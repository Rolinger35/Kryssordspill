<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Norsk Kryssord</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --accent: #facc15; 
            --track: #bae6fd; --active-yellow: #fef9c3; 
            --correct: #22c55e; --wrong: #ef4444; 
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        html, body { 
            width: 100%; height: 100%; height: 100dvh; 
            background: var(--bg); color: white; 
            font-family: -apple-system, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; 
        }

        header { flex-shrink: 0; display: flex; justify-content: space-between; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid #334155; align-items: center; z-index: 100; }
        
        #size-choice { 
            padding: 6px; border-radius: 4px; 
            background: #334155; color: white; 
            font-weight: bold; border: 1px solid #475569;
        }
        
        #clue-bar { flex-shrink: 0; padding: 10px; background: #334155; color: var(--accent); font-weight: 600; min-height: 50px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; text-align: center; border-bottom: 1px solid #475569; }
        
        .controls { flex-shrink: 0; padding: 6px; background: var(--panel); display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; z-index: 100; }

        #grid-wrapper { flex: 1; width: 100%; display: flex; align-items: center; justify-content: center; padding: 10px; min-height: 0; overflow: hidden; }

        #grid { display: grid; gap: 1px; background: #334155; border: 2px solid #334155; height: 100%; max-width: 100%; aspect-ratio: 1 / 1; margin: auto; }

        .cell { 
            background: white; color: #1e293b; position: relative; display: flex; justify-content: center; align-items: center; font-weight: bold; 
            font-size: 2.5cqw; cursor: pointer; container-type: size; z-index: 1;
        }

        .cell.black { background: var(--bg); border: none; cursor: default; }
        .cell.track { background: var(--track) !important; }
        .cell.active { background: var(--active-yellow) !important; box-shadow: inset 0 0 0 2px #fde047; z-index: 5 !important; }
        .cell.correct { background: var(--correct) !important; color: white; }
        .cell.wrong { background: var(--wrong) !important; color: white; }
        
        .number { position: absolute; top: 1px; left: 1px; font-size: 7px; color: #64748b; pointer-events: none; z-index: 10; }

        #keyboard { flex-shrink: 0; background: var(--panel); padding: 5px 2px env(safe-area-inset-bottom, 15px); z-index: 100; }
        .kb-row { display: flex; justify-content: center; margin-bottom: 3px; }
        .key { margin: 1px; padding: 12px 0; background: #475569; border-radius: 4px; flex: 1; max-width: 36px; font-weight: bold; font-size: 14px; text-align: center; color: white; border: none; cursor: pointer; }

        /* Modaler */
        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.98); display: none; flex-direction: column; padding: 20px; z-index: 3000; overflow-y: auto; }
        button { padding: 6px 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #2563eb; color: white; }
        .btn-yellow { background: var(--accent); color: #0f172a; }
        .btn-red { background: #ef4444; color: white; }
        .btn-purple { background: #8b5cf6; color: white; }

        /* Toast-melding (Istedenfor alert) */
        #toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            background: #10b981; color: white; padding: 12px 24px; border-radius: 50px;
            font-weight: bold; z-index: 10000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .toast-active { display: block !important; animation: toastAnim 2s forwards; }
        @keyframes toastAnim {
            0% { opacity: 0; bottom: 100px; }
            20% { opacity: 1; bottom: 120px; }
            80% { opacity: 1; bottom: 120px; }
            100% { opacity: 0; bottom: 140px; }
        }

        .win-content { margin: auto; text-align: center; }
        .win-content h1 { font-size: 3.5rem; color: var(--accent); margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <select id="size-choice" onchange="startNewOrLoad()">
        <option value="mini">Mini</option>
        <option value="medium" selected>Medium</option>
        <option value="large">Stor</option>
    </select>
    <div style="display:flex; gap:6px;">
        <button class="btn-yellow" onclick="openWordBook()">📖</button>
        <button class="btn-blue" onclick="openAddWord()">➕</button>
        <button class="btn-blue" onclick="forceNewGame()">NYTT</button>
    </div>
</header>

<div id="clue-bar">Velg en rute</div>

<div class="controls">
    <button style="background:#10b981; color:white;" onclick="checkActiveWord()">SJEKK</button>
    <button class="btn-yellow" onclick="saveToStudyList()">LAGRE</button>
    <button class="btn-purple" onclick="revealLetter()">BOKSTAV</button>
    <button class="btn-purple" style="background:#6d28d9;" onclick="revealFullWord()">AVSLØR ORD</button>
    <button class="btn-red" onclick="resetCurrentWord()">TØM</button>
</div>

<div id="grid-wrapper">
    <div id="grid"></div>
</div>

<div id="keyboard"></div>

<div id="toast">Lagret!</div>

<div id="win" class="modal">
    <div class="win-content">
        <h1>🎉 HURRA!</h1>
        <p>Du er en mester!</p>
        <div style="display:flex; flex-direction:column; gap:10px; margin-top:20px; align-items:center;">
            <button class="btn-blue" style="width:200px; padding:15px;" onclick="forceNewGame()">SPILL IGJEN</button>
            <button class="btn-yellow" style="width:200px; padding:15px;" onclick="closeModals()">SE BRETTET</button>
        </div>
    </div>
</div>

<div id="wordbook-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Min Glosebok</h2>
        <button class="btn-red" onclick="closeModals()">LUKK</button>
    </div>
    <div id="word-list"></div>
</div>

<div id="addword-modal" class="modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <h2>Legg til ord</h2>
        <button class="btn-red" onclick="closeModals()">LUKK</button>
    </div>
    <input type="text" id="new-word" placeholder="ORD" style="width:100%; padding:12px; margin-bottom:10px; text-transform:uppercase; background:#0f172a; color:white; border:1px solid #334155">
    <input type="text" id="new-clue" placeholder="LEDETRÅD" style="width:100%; padding:12px; margin-bottom:10px; background:#0f172a; color:white; border:1px solid #334155">
    <button class="btn-blue" style="width:100%; padding:15px;" onclick="addNewWordToBank()">LAGRE ORD</button>
</div>

  { w: "SKALKOMME", c: "Framtid av 'å komme'" }
];

let G = { size: 12, target: 11, grid: {}, words: [], user: {}, sel: null, dir: 'h', markers: {} };

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.remove('toast-active');
    void t.offsetWidth; // Trigger reflow
    t.classList.add('toast-active');
    setTimeout(() => t.classList.remove('toast-active'), 2000);
}

function startNewOrLoad() {
    const choice = document.getElementById('size-choice').value;
    const saved = localStorage.getItem('kryssord_save_' + choice);
    if (saved) { G = JSON.parse(saved); render(); } 
    else { initGame(); }
}

function forceNewGame() {
    localStorage.removeItem('kryssord_save_' + document.getElementById('size-choice').value);
    initGame();
}

function initGame() {
    const choice = document.getElementById('size-choice').value;
    if (choice === 'mini') { G.size = 8; G.target = 6; }
    else if (choice === 'medium') { G.size = 12; G.target = 11; }
    else { G.size = 14; G.target = 17; }
    
    G.grid = {}; G.words = []; G.user = {}; G.sel = null; G.markers = {}; G.dir = 'h';
    closeModals();

    let pool = [...DEFAULT_WORDS, ...JSON.parse(localStorage.getItem('custom_words') || '[]')].sort(() => Math.random() - 0.5);
    forcePlace(pool.pop(), 1, 1, 'h');

    for(let attempt = 0; attempt < 3000; attempt++) {
        if(G.words.length >= G.target) break;
        let w = pool[attempt % pool.length];
        if(G.words.find(ex => ex.w === w.w)) continue;
        outer: for(let p of G.words) {
            for(let i=0; i<p.w.length; i++) {
                for(let j=0; j<w.w.length; j++) {
                    if(p.w[i] === w.w[j]) {
                        let nDir = p.dir === 'h' ? 'v' : 'h';
                        let r = nDir === 'v' ? p.cells[i].r - j : p.cells[i].r;
                        let c = nDir === 'h' ? p.cells[i].c - j : p.cells[i].c;
                        if(isValid(w.w, r, c, nDir)) { forcePlace(w, r, c, nDir); break outer; }
                    }
                }
            }
        }
    }
    let count = 1;
    let starts = G.words.map(w => ({k:`${w.cells[0].r}-${w.cells[0].c}`, r:w.cells[0].r, c:w.cells[0].c})).sort((a,b)=>a.r-b.r||a.c-b.c);
    starts.forEach(s => { if(!G.markers[s.k]) G.markers[s.k] = count++; });
    render();
    saveGame();
}

function isValid(w, r, c, d) {
    if(r < 0 || c < 0 || (d==='v' && r+w.length >= G.size) || (d==='h' && c+w.length >= G.size)) return false;
    for(let i=-1; i<=w.length; i++) {
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        if(rr < 0 || rr >= G.size || cc < 0 || cc >= G.size) continue;
        let existing = G.grid[`${rr}-${cc}`];
        if(i === -1 || i === w.length) { if(existing) return false; } 
        else {
            if(existing && existing !== w[i]) return false;
            let neighbors = d==='h' ? [[rr-1,cc],[rr+1,cc]] : [[rr,cc-1],[rr,cc+1]];
            if(!existing) { for(let [nr,nc] of neighbors) if(G.grid[`${nr}-${nc}`]) return false; }
        }
    }
    return true;
}

function forcePlace(w, r, c, d) {
    let cells = [];
    for(let i=0; i<w.w.length; i++){
        let rr = d==='v'?r+i:r, cc = d==='h'?c+i:c;
        G.grid[`${rr}-${cc}`] = w.w[i];
        cells.push({r:rr, c:cc});
    }
    G.words.push({...w, cells, dir:d});
}

function render() {
    const el = document.getElementById("grid");
    el.innerHTML = ""; 
    el.style.gridTemplateColumns = `repeat(${G.size}, 1fr)`;
    el.style.gridTemplateRows = `repeat(${G.size}, 1fr)`;
    for(let r=0; r<G.size; r++) {
        for(let c=0; c<G.size; c++) {
            let k = `${r}-${c}`, d = document.createElement("div");
            d.className = "cell" + (G.grid[k] ? "" : " black");
            if(G.grid[k]) {
                if(G.markers[k]) d.innerHTML = `<span class="number">${G.markers[k]}</span>`;
                let t = document.createElement("div"); t.id = "t-"+k; t.innerText = G.user[k] || "";
                d.appendChild(t);
                d.onclick = (e) => { e.stopPropagation(); selectCell(k); };
            }
            d.id = "c-"+k; el.appendChild(d);
        }
    }
    updateUI();
}

function selectCell(k) {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct', 'wrong'));
    let ws = G.words.filter(w => w.cells.some(c => `${c.r}-${c.c}` === k));
    if(!ws.length) return;
    if(G.sel === k && ws.length > 1) { G.dir = (G.dir === 'h' ? 'v' : 'h'); } 
    else { G.sel = k; if(!ws.find(o => o.dir === G.dir)) G.dir = ws[0].dir; }
    updateUI();
}

function getAW() { return G.words.find(w => w.dir === G.dir && w.cells.some(c => `${c.r}-${c.c}` === G.sel)); }

function checkActiveWord() {
    let aw = getAW(); if(!aw) return;
    aw.cells.forEach((c, i) => {
        let el = document.getElementById("c-"+c.r+"-"+c.c);
        el.classList.add(G.user[`${c.r}-${c.c}`] === aw.w[i] ? "correct" : "wrong");
    });
}

function revealLetter() { 
    if(G.sel) { 
        G.user[G.sel] = G.grid[G.sel]; 
        document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct', 'wrong'));
        updateUI(); checkWin(); saveGame(); 
    } 
}

function revealFullWord() {
    let aw = getAW();
    if(aw) { 
        aw.cells.forEach((c, i) => G.user[`${c.r}-${c.c}`] = aw.w[i]); 
        document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct', 'wrong'));
        updateUI(); checkWin(); saveGame(); 
    }
}

function resetCurrentWord() { 
    let aw = getAW(); 
    if(aw) { 
        aw.cells.forEach(c => G.user[`${c.r}-${c.c}`] = ""); 
        document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct', 'wrong'));
        updateUI(); saveGame(); 
    } 
}

function checkWin() { 
    const isFull = Object.keys(G.grid).length > 0 && Object.keys(G.grid).every(k => G.user[k] === G.grid[k]);
    if(isFull) {
        document.getElementById('win').style.display = 'flex';
        confetti({ particleCount: 180, spread: 80, origin: { y: 0.6 }, zIndex: 9999 });
    }
}

function updateUI() {
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('active', 'track'));
    let aw = getAW();
    if(G.sel && aw) {
        document.getElementById("c-"+G.sel)?.classList.add("active");
        aw.cells.forEach(c => document.getElementById(`c-${c.r}-${c.c}`)?.classList.add('track'));
        let headK = `${aw.cells[0].r}-${aw.cells[0].c}`;
        document.getElementById("clue-bar").innerText = `${G.markers[headK]} ${G.dir==='h'?'VANNRETT':'LODDRETT'}: ${aw.c}`;
    }
    Object.keys(G.grid).forEach(k => { if(document.getElementById("t-"+k)) document.getElementById("t-"+k).innerText = G.user[k] || ""; });
}

function handleInput(key) {
    let aw = getAW(); if(!aw) return;
    document.querySelectorAll('.cell').forEach(e => e.classList.remove('correct', 'wrong'));
    let idx = aw.cells.findIndex(c => `${c.r}-${c.c}` === G.sel);
    if(key === "⌫") { G.user[G.sel] = ""; if(idx > 0) G.sel = `${aw.cells[idx-1].r}-${aw.cells[idx-1].c}`; } 
    else { G.user[G.sel] = key; if(idx < aw.cells.length - 1) G.sel = `${aw.cells[idx+1].r}-${aw.cells[idx+1].c}`; }
    updateUI(); checkWin(); saveGame();
}

function saveToStudyList() {
    let aw = getAW(); if(!aw) return;
    let list = JSON.parse(localStorage.getItem('study_list') || '[]');
    if(!list.find(i => i.w === aw.w)) { 
        list.push({w: aw.w, c: aw.c}); 
        localStorage.setItem('study_list', JSON.stringify(list)); 
        showToast("Lagret i glosebok!");
    }
}

function openWordBook() {
    const list = JSON.parse(localStorage.getItem('study_list') || '[]');
    const container = document.getElementById('word-list');
    container.innerHTML = list.length ? "" : "<p>Gloseboken er tom.</p>";
    list.forEach((item, index) => {
        const div = document.createElement('div');
        div.style = "background:#1e293b; padding:12px; margin-bottom:8px; border-radius:6px; display:flex; justify-content:space-between; align-items:center;";
        div.innerHTML = `<div><b>${item.w}</b>: ${item.c}</div><button onclick="removeFromStudyList(${index})" style="background:#ef4444; color:white; padding:5px; border-radius:4px">Slett</button>`;
        container.appendChild(div);
    });
    document.getElementById('wordbook-modal').style.display = 'flex';
}

function removeFromStudyList(i) {
    let list = JSON.parse(localStorage.getItem('study_list') || '[]');
    list.splice(i, 1);
    localStorage.setItem('study_list', JSON.stringify(list));
    openWordBook();
}

function openAddWord() { document.getElementById('addword-modal').style.display = 'flex'; }
function closeModals() { document.querySelectorAll('.modal').forEach(m => m.style.display = 'none'); }

function addNewWordToBank() {
    const w = document.getElementById('new-word').value.toUpperCase().trim();
    const c = document.getElementById('new-clue').value.trim();
    if(w.length < 2 || c.length < 2) return;
    const custom = JSON.parse(localStorage.getItem('custom_words') || '[]');
    custom.push({w, c});
    localStorage.setItem('custom_words', JSON.stringify(custom));
    document.getElementById('new-word').value = ""; document.getElementById('new-clue').value = "";
    closeModals(); 
    showToast("Nytt ord lagt til!");
}

function saveGame() {
    const choice = document.getElementById('size-choice').value;
    localStorage.setItem('kryssord_save_' + choice, JSON.stringify(G));
}

const kb = [["Q","W","E","R","T","Y","U","I","O","P","Å"],["A","S","D","F","G","H","J","K","L","Ø","Æ"],["Z","X","C","V","B","N","M","⌫"]];
kb.forEach(row => {
    let r = document.createElement("div"); r.className = "kb-row";
    row.forEach(key => {
        let k = document.createElement("button"); k.className = "key"; k.innerText = key;
        k.onclick = (e) => { e.preventDefault(); handleInput(key); }; r.appendChild(k);
    });
    document.getElementById("keyboard").appendChild(r);
});

window.onload = startNewOrLoad;
</script>
